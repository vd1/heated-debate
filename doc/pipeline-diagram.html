<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shelley Pipeline</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f0e8;
    font-family: "IBM Plex Sans", "Helvetica Neue", Arial, sans-serif;
    display: flex;
    justify-content: center;
    padding: 48px 20px;
    min-height: 100vh;
  }
  svg {
    max-width: 940px;
    width: 100%;
    height: auto;
  }
  .tooltip {
    position: fixed;
    background: #2c2c2c;
    color: #f5f0e8;
    padding: 8px 14px;
    border-radius: 4px;
    font-size: 13px;
    max-width: 300px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 10;
    line-height: 1.45;
  }
  [data-tip] { cursor: pointer; }
  [data-tip]:hover rect, [data-tip]:hover ellipse { filter: brightness(0.96); }
</style>
</head>
<body>

<div class="tooltip" id="tip"></div>

<svg viewBox="0 0 920 820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="a" markerWidth="7" markerHeight="5" refX="6.5" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#3b6ea5"/>
    </marker>
    <marker id="ar" markerWidth="7" markerHeight="5" refX="6.5" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#c0586e"/>
    </marker>
    <marker id="ag" markerWidth="7" markerHeight="5" refX="6.5" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#999"/>
    </marker>
    <!-- document icon for file outputs -->
    <symbol id="doc" viewBox="0 0 16 20">
      <path d="M2,0 L10,0 L14,4 L14,18 A2,2,0,0,1,12,20 L4,20 A2,2,0,0,1,2,18 Z" fill="none" stroke="#999" stroke-width="1.2"/>
      <path d="M10,0 L10,4 L14,4" fill="none" stroke="#999" stroke-width="1"/>
    </symbol>
  </defs>

  <!-- ─── Title ─── -->
  <text x="460" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#2c2c2c"
        font-family="IBM Plex Sans, sans-serif" letter-spacing="0.3">shelley — debate pipeline</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- DEBATE BOX                                             -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="120" y="54" width="680" height="270" rx="8" fill="rgba(59,110,165,0.03)"
        stroke="#3b6ea5" stroke-width="1.4" stroke-dasharray="8,4"/>
  <text x="140" y="76" font-size="11" fill="#3b6ea5" font-weight="600"
        font-family="IBM Plex Mono, monospace" opacity="0.8">runDebate( args, specA, specB, moderator, panel, ?prior )</text>

  <!-- ─── Inputs ─── -->
  <g class="node" data-tip="Topic file loaded via -f flag. Contains the debate question, output contract, and optional prior constraints.">
    <ellipse cx="60" cy="150" rx="42" ry="17" fill="#f5f0e8" stroke="#3b6ea5" stroke-width="1.4"/>
    <text x="60" y="154" text-anchor="middle" font-size="12" fill="#3b6ea5"
          font-family="IBM Plex Mono, monospace" font-weight="500">!topic</text>
  </g>
  <path d="M102,150 L160,150" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#a)" fill="none"/>

  <g class="node" data-tip="Prior constraints from a previous iteration. Injected into round-1 prompts as '## Prior Constraints' section. Contains settled conclusions as givens and open questions as focus areas.">
    <ellipse cx="60" cy="210" rx="42" ry="17" fill="#f5f0e8" stroke="#3b6ea5" stroke-width="1.4" stroke-dasharray="4,3"/>
    <text x="60" y="214" text-anchor="middle" font-size="12" fill="#3b6ea5"
          font-family="IBM Plex Mono, monospace" font-weight="500">?prior</text>
  </g>
  <path d="M102,210 L140,210 L155,180" stroke="#3b6ea5" stroke-width="1.1" stroke-dasharray="5,3"
        marker-end="url(#a)" fill="none"/>

  <!-- ─── Agent A ─── -->
  <g class="node" data-tip="Proposing agent. Argues position with clarity and conviction. Claude or Codex backend. Stateful session persists across rounds.">
    <rect x="162" y="128" width="130" height="46" rx="5" fill="#e8f0fa" stroke="#3b6ea5" stroke-width="2"/>
    <rect x="165" y="131" width="124" height="40" rx="4" fill="#e8f0fa" stroke="#3b6ea5" stroke-width="0.8"/>
    <text x="227" y="156" text-anchor="middle" font-size="14" font-weight="600" fill="#2c2c2c">Agent A</text>
  </g>

  <!-- ─── Round arrows ─── -->
  <path d="M292,144 L378,144" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#a)" fill="none"/>
  <path d="M378,160 L292,160" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#a)" fill="none"/>
  <text x="335" y="137" text-anchor="middle" font-size="10" fill="#777"
        font-family="IBM Plex Mono, monospace">x R rounds</text>

  <!-- ─── Agent B ─── -->
  <g class="node" data-tip="Opposing agent. Challenges proposals, finds flaws, pushes for better alternatives. Claude or Codex backend. Stateful session persists across rounds.">
    <rect x="380" y="128" width="130" height="46" rx="5" fill="#e8f0fa" stroke="#3b6ea5" stroke-width="2"/>
    <rect x="383" y="131" width="124" height="40" rx="4" fill="#e8f0fa" stroke="#3b6ea5" stroke-width="0.8"/>
    <text x="445" y="156" text-anchor="middle" font-size="14" font-weight="600" fill="#2c2c2c">Agent B</text>
  </g>

  <!-- ─── Moderator ─── -->
  <g class="node" data-tip="Optional stateless moderator. Runs between every turn. Nudges agents if drifting, converging too early, or running out of rounds. Can override creativity dial level.">
    <polygon points="335,220 355,240 335,260 315,240" fill="#fdf0f2" stroke="#c0586e" stroke-width="1.4"/>
    <text x="335" y="244" text-anchor="middle" font-size="11" fill="#c0586e" font-weight="700">M</text>
  </g>
  <path d="M227,174 L320,230" stroke="#c0586e" stroke-width="0.9" stroke-dasharray="3,3"
        marker-end="url(#ar)" fill="none"/>
  <path d="M445,174 L350,230" stroke="#c0586e" stroke-width="0.9" stroke-dasharray="3,3"
        marker-end="url(#ar)" fill="none"/>
  <text x="395" y="230" font-size="10" fill="#c0586e" font-style="italic">optional</text>

  <!-- ─── Expert Panel ─── -->
  <g class="node" data-tip="3 independent expert personas (Pragmatist, Devil's Advocate, Architect) score the debate, then a synthesizer merges their assessments. Enabled via PANEL env var. Output: _panel.json appended to transcript.">
    <rect x="580" y="130" width="150" height="42" rx="5" fill="#f0f5e8" stroke="#5a8a3c" stroke-width="1.4"/>
    <text x="655" y="156" text-anchor="middle" font-size="13" font-weight="600" fill="#3c6a2c">Expert Panel</text>
  </g>
  <text x="655" y="188" text-anchor="middle" font-size="10" fill="#5a8a3c" font-style="italic">optional</text>
  <path d="M510,151 L580,151" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#a)" fill="none"/>
  <text x="545" y="144" font-size="9" fill="#777" font-family="IBM Plex Mono, monospace">!transcript</text>

  <!-- ─── DebateResult output ─── -->
  <path d="M445,174 L445,324 L445,355" stroke="#3b6ea5" stroke-width="1.8" marker-end="url(#a)" fill="none"/>
  <rect x="392" y="330" width="106" height="20" rx="3" fill="#f5f0e8"/>
  <text x="445" y="344" text-anchor="middle" font-size="11" fill="#3b6ea5"
        font-family="IBM Plex Mono, monospace" font-weight="600">DebateResult</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- PIPELINE BOX                                           -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="160" y="370" width="600" height="230" rx="8" fill="rgba(128,128,128,0.04)"
        stroke="#999" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="180" y="392" font-size="11" fill="#999" font-weight="600"
        font-family="IBM Plex Mono, monospace">PIPELINE  ( enabled via PIPELINE env var )</text>

  <!-- ─── Fan-out ─── -->
  <g class="node" data-tip="Fan-out: the transcript is sent to both mechanics and substance agents in parallel. They run independently — neither sees the other's output.">
    <polygon points="445,410 462,427 445,444 428,427" fill="#fdf0f2" stroke="#c0586e" stroke-width="1.4"/>
    <text x="445" y="431" text-anchor="middle" font-size="12" fill="#c0586e" font-weight="700">&#916;</text>
  </g>

  <!-- ─── Mechanics ─── -->
  <g class="node" data-tip="Evaluates debate PROCESS: dial effectiveness, convergence quality, contract adherence, circular arguments, off-topic drifts, agent dynamics. Produces concrete recommendations for prompt tuning. Writes meta-*.md + meta-*.json.">
    <rect x="225" y="460" width="150" height="46" rx="5" fill="#e8f0fa" stroke="#3b6ea5" stroke-width="2"/>
    <rect x="228" y="463" width="144" height="40" rx="4" fill="#e8f0fa" stroke="#3b6ea5" stroke-width="0.8"/>
    <text x="300" y="488" text-anchor="middle" font-size="13" font-weight="600" fill="#2c2c2c">mechanics</text>
  </g>
  <path d="M435,438 L360,460" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#a)" fill="none"/>

  <!-- ─── Substance ─── -->
  <g class="node" data-tip="Extracts CONTENT: settled conclusions, open questions, best ideas, dependency chains, concrete proposals. Produces a priorConstraints block formatted for injection into the next iteration. Writes substance-*.md + substance-*.json.">
    <rect x="525" y="460" width="150" height="46" rx="5" fill="#e8f0fa" stroke="#3b6ea5" stroke-width="2"/>
    <rect x="528" y="463" width="144" height="40" rx="4" fill="#e8f0fa" stroke="#3b6ea5" stroke-width="0.8"/>
    <text x="600" y="488" text-anchor="middle" font-size="13" font-weight="600" fill="#2c2c2c">substance</text>
  </g>
  <path d="M455,438 L530,460" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#a)" fill="none"/>

  <!-- ─── File outputs ─── -->
  <g data-tip="Process quality assessment. Machine-readable JSON + human-readable markdown.">
    <use href="#doc" x="275" y="516" width="14" height="18"/>
    <text x="295" y="532" font-size="10" fill="#888" font-family="IBM Plex Mono, monospace">meta-*.md</text>
  </g>
  <path d="M300,506 L300,518" stroke="#999" stroke-width="0.8" marker-end="url(#ag)" fill="none"/>

  <g data-tip="Substantive deliverable. Contains settled conclusions, open questions, best ideas, and the priorConstraints block for the next iteration.">
    <use href="#doc" x="575" y="516" width="14" height="18"/>
    <text x="595" y="532" font-size="10" fill="#888" font-family="IBM Plex Mono, monospace">substance-*.md</text>
  </g>
  <path d="M600,506 L600,518" stroke="#999" stroke-width="0.8" marker-end="url(#ag)" fill="none"/>

  <!-- ─── Barrier ─── -->
  <g class="node" data-tip="Barrier: both mechanics and substance must complete before the iteration agent runs. The iteration agent is the only component that sees both reports.">
    <polygon points="445,555 462,572 445,589 428,572" fill="#fdf0f2" stroke="#c0586e" stroke-width="1.4"/>
    <text x="445" y="576" text-anchor="middle" font-size="12" fill="#c0586e" font-weight="700">&#8904;</text>
  </g>
  <!-- mechanics feeds the decision (iterate/stop) -->
  <path d="M300,506 L300,562 L428,572" stroke="#3b6ea5" stroke-width="1.1" fill="none"/>
  <!-- substance feeds both the decision AND the constraint content -->
  <path d="M600,506 L600,562 L462,572" stroke="#3b6ea5" stroke-width="1.1" fill="none"/>

  <!-- ─── Substance → prior derivation (the key link) ─── -->
  <g data-tip="The substance report's priorConstraints field is the primary source of the iteration agent's constraint output. Mechanics informs the iterate/stop decision; substance provides the content that becomes ?prior.">
    <path d="M675,506 L675,640 L515,640" stroke="#c08a3b" stroke-width="1.2" stroke-dasharray="4,3"
          marker-end="url(#a)" fill="none"/>
    <text x="690" y="578" font-size="9" fill="#c08a3b" font-family="IBM Plex Mono, monospace"
          writing-mode="tb" letter-spacing="0.5">.priorConstraints</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ITERATION                                              -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- ─── Iteration Agent ─── -->
  <g class="node" data-tip="Decision agent. Reads both mechanics and substance reports. Decides whether to re-run the debate with the substance's priorConstraints, or stop. Respects the iteration budget (PIPELINE_MAX_ITER).">
    <rect x="375" y="620" width="140" height="46" rx="5" fill="#faf0e8" stroke="#c08a3b" stroke-width="2"/>
    <rect x="378" y="623" width="134" height="40" rx="4" fill="#faf0e8" stroke="#c08a3b" stroke-width="0.8"/>
    <text x="445" y="648" text-anchor="middle" font-size="13" font-weight="600" fill="#2c2c2c">iteration</text>
  </g>
  <path d="M445,589 L445,620" stroke="#3b6ea5" stroke-width="1.4" marker-end="url(#a)" fill="none"/>

  <!-- ─── Decision fork ─── -->
  <path d="M445,666 L445,700" stroke="#3b6ea5" stroke-width="1.4" fill="none"/>

  <!-- stop -->
  <g class="node" data-tip="Debate complete. All output files (transcript, meta, substance, panel) are in the debate directory.">
    <path d="M445,700 L590,700" stroke="#3b6ea5" stroke-width="1.4" fill="none"/>
    <ellipse cx="640" cy="700" rx="42" ry="17" fill="#f5f0e8" stroke="#3b6ea5" stroke-width="1.4"/>
    <text x="640" y="704" text-anchor="middle" font-size="12" fill="#3b6ea5" font-weight="600"
          font-family="IBM Plex Mono, monospace">done</text>
  </g>
  <text x="525" y="693" text-anchor="middle" font-size="11" fill="#5a8a3c" font-weight="600">"stop"</text>

  <!-- iterate -->
  <g class="node" data-tip="Re-run the debate. Substance report's priorConstraints become the ?prior input for the next runDebate() call. Settled conclusions are injected as givens, open questions as focus areas.">
    <path d="M445,700 L300,700 L300,740" stroke="#c0586e" stroke-width="1.5" fill="none"/>
  </g>
  <text x="365" y="693" text-anchor="middle" font-size="11" fill="#c0586e" font-weight="600">"iterate"</text>
  <text x="300" y="758" text-anchor="middle" font-size="11" fill="#c0586e"
        font-family="IBM Plex Mono, monospace">.constraints</text>

  <!-- ─── Feedback loop ─── -->
  <path d="M300,740 L120,740 L120,210"
        stroke="#c0586e" stroke-width="1.5" stroke-dasharray="7,4" fill="none"
        marker-end="url(#ar)"/>
  <text x="138" y="490" font-size="10" fill="#c0586e" font-family="IBM Plex Mono, monospace"
        writing-mode="tb" letter-spacing="1">feedback</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LEGEND                                                 -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <g transform="translate(710, 740)">
    <rect x="-12" y="-16" width="140" height="90" rx="4" fill="#f5f0e8" stroke="#ccc" stroke-width="0.8"/>
    <text x="0" y="0" font-size="11" font-weight="700" fill="#2c2c2c">Legend</text>

    <rect x="0" y="12" width="22" height="13" rx="3" fill="#e8f0fa" stroke="#3b6ea5" stroke-width="1.4"/>
    <text x="30" y="22" font-size="10" fill="#555">agent</text>

    <polygon points="11,38 22,45 11,52 0,45" fill="#fdf0f2" stroke="#c0586e" stroke-width="1"/>
    <text x="30" y="48" font-size="10" fill="#555">sync point</text>

    <line x1="0" y1="62" x2="22" y2="62" stroke="#c0586e" stroke-width="1.4" stroke-dasharray="5,3"/>
    <text x="30" y="66" font-size="10" fill="#555">feedback</text>
  </g>
</svg>

<script>
const tip = document.getElementById('tip');
document.querySelectorAll('[data-tip]').forEach(el => {
  el.addEventListener('mouseenter', () => {
    tip.textContent = el.getAttribute('data-tip');
    tip.style.opacity = '1';
  });
  el.addEventListener('mousemove', e => {
    tip.style.left = (e.clientX + 14) + 'px';
    tip.style.top = (e.clientY + 14) + 'px';
  });
  el.addEventListener('mouseleave', () => tip.style.opacity = '0');
});
</script>

</body>
</html>
