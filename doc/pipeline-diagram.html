<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shelley Pipeline</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f0e8;
    font-family: "IBM Plex Sans", "Helvetica Neue", Arial, sans-serif;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
    min-height: 100vh;
  }
  svg {
    max-width: 900px;
    width: 100%;
    height: auto;
  }
  /* tooltip */
  .tooltip {
    position: fixed;
    background: #2c2c2c;
    color: #f5f0e8;
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 13px;
    max-width: 280px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 10;
    line-height: 1.4;
  }
</style>
</head>
<body>

<div class="tooltip" id="tip"></div>

<svg viewBox="0 0 860 780" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3b6ea5"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c0586e"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#888"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="430" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#2c2c2c" font-family="IBM Plex Sans, sans-serif">shelley — debate pipeline</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- DEBATE BOX -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="100" y="50" width="660" height="280" rx="6" fill="none" stroke="#3b6ea5" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="120" y="72" font-size="11" fill="#3b6ea5" font-weight="600" font-family="IBM Plex Mono, monospace">runDebate(args, specA, specB, moderator, panel, ?prior)</text>

  <!-- Input: !topic -->
  <g class="node" data-tip="Topic file loaded via -f flag. Contains the debate question and output contract.">
    <ellipse cx="50" cy="140" rx="38" ry="16" fill="none" stroke="#3b6ea5" stroke-width="1.5"/>
    <text x="50" y="144" text-anchor="middle" font-size="12" fill="#3b6ea5" font-family="IBM Plex Mono, monospace">!topic</text>
  </g>
  <line x1="88" y1="140" x2="148" y2="140" stroke="#3b6ea5" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Input: ?prior (dashed) -->
  <g class="node" data-tip="Prior constraints from a previous iteration. Injected into round-1 prompts as settled conclusions + focus areas.">
    <ellipse cx="50" cy="190" rx="38" ry="16" fill="none" stroke="#3b6ea5" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="50" y="194" text-anchor="middle" font-size="12" fill="#3b6ea5" font-family="IBM Plex Mono, monospace">?prior</text>
  </g>
  <line x1="88" y1="190" x2="148" y2="170" stroke="#3b6ea5" stroke-width="1.2" stroke-dasharray="6,3" marker-end="url(#arrow)"/>

  <!-- Agent A -->
  <g class="node" data-tip="Proposing agent. Argues position with conviction. Uses Claude or Codex backend. Stateful session across rounds.">
    <rect x="150" y="115" width="120" height="44" rx="4" fill="#e8f0fa" stroke="#3b6ea5" stroke-width="2"/>
    <rect x="153" y="118" width="114" height="38" rx="3" fill="#e8f0fa" stroke="#3b6ea5" stroke-width="1"/>
    <text x="210" y="142" text-anchor="middle" font-size="14" font-weight="600" fill="#2c2c2c">Agent A</text>
  </g>

  <!-- Bidirectional arrows A <-> B -->
  <line x1="270" y1="130" x2="370" y2="130" stroke="#3b6ea5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="370" y1="145" x2="270" y2="145" stroke="#3b6ea5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="320" y="122" text-anchor="middle" font-size="10" fill="#666" font-family="IBM Plex Mono, monospace">x R rounds</text>

  <!-- Agent B -->
  <g class="node" data-tip="Opposing agent. Challenges proposals, finds flaws. Uses Claude or Codex backend. Stateful session across rounds.">
    <rect x="370" y="115" width="120" height="44" rx="4" fill="#e8f0fa" stroke="#3b6ea5" stroke-width="2"/>
    <rect x="373" y="118" width="114" height="38" rx="3" fill="#e8f0fa" stroke="#3b6ea5" stroke-width="1"/>
    <text x="430" y="142" text-anchor="middle" font-size="14" font-weight="600" fill="#2c2c2c">Agent B</text>
  </g>

  <!-- Moderator diamond -->
  <g class="node" data-tip="Optional moderator. Stateless per-turn. Nudges agents if drifting, converging too early, or running out of rounds. Can override creativity dial.">
    <polygon points="320,195 340,215 320,235 300,215" fill="#fdf0f2" stroke="#c0586e" stroke-width="1.5"/>
    <text x="320" y="219" text-anchor="middle" font-size="10" fill="#c0586e" font-weight="600">M</text>
  </g>
  <line x1="210" y1="159" x2="305" y2="205" stroke="#c0586e" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>
  <line x1="430" y1="159" x2="335" y2="205" stroke="#c0586e" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>
  <text x="380" y="195" font-size="10" fill="#c0586e" font-style="italic">optional</text>

  <!-- Expert Panel -->
  <g class="node" data-tip="3 expert personas (Pragmatist, Devil's Advocate, Architect) score the debate independently, then a synthesizer merges their assessments. Enabled via PANEL env var.">
    <rect x="540" y="185" width="140" height="40" rx="4" fill="#f0f5e8" stroke="#5a8a3c" stroke-width="1.5"/>
    <text x="610" y="210" text-anchor="middle" font-size="13" font-weight="600" fill="#3c6a2c">Expert Panel</text>
  </g>
  <text x="610" y="240" text-anchor="middle" font-size="10" fill="#5a8a3c" font-style="italic">optional</text>

  <!-- Transcript output arrow -->
  <line x1="490" y1="137" x2="540" y2="137" stroke="#3b6ea5" stroke-width="1.5"/>
  <line x1="540" y1="137" x2="540" y2="195" stroke="#3b6ea5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="555" y="165" font-size="10" fill="#666" font-family="IBM Plex Mono, monospace">!transcript</text>

  <!-- Output from debate box -->
  <line x1="430" y1="159" x2="430" y2="300" stroke="#3b6ea5" stroke-width="1.5"/>
  <line x1="430" y1="300" x2="430" y2="350" stroke="#3b6ea5" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="445" y="340" font-size="11" fill="#3b6ea5" font-family="IBM Plex Mono, monospace">DebateResult</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- PIPELINE SECTION -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="140" y="360" width="580" height="200" rx="6" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="160" y="382" font-size="11" fill="#888" font-weight="600" font-family="IBM Plex Mono, monospace">PIPELINE (enabled via PIPELINE env var)</text>

  <!-- Fan-out point -->
  <g class="node" data-tip="Fan-out: transcript is sent to mechanics and substance agents in parallel. They run independently and do not see each other's output.">
    <polygon points="430,370 445,385 430,400 415,385" fill="#fdf0f2" stroke="#c0586e" stroke-width="1.5"/>
    <text x="430" y="389" text-anchor="middle" font-size="9" fill="#c0586e" font-weight="700">&Delta;</text>
  </g>

  <!-- Mechanics Agent -->
  <g class="node" data-tip="Evaluates debate PROCESS: creativity dial effectiveness, convergence quality, contract adherence, circular arguments, off-topic drifts. Writes meta-*.md and meta-*.json.">
    <rect x="220" y="420" width="140" height="44" rx="4" fill="#e8f0fa" stroke="#3b6ea5" stroke-width="2"/>
    <rect x="223" y="423" width="134" height="38" rx="3" fill="#e8f0fa" stroke="#3b6ea5" stroke-width="1"/>
    <text x="290" y="447" text-anchor="middle" font-size="13" font-weight="600" fill="#2c2c2c">mechanics</text>
  </g>
  <line x1="422" y1="395" x2="355" y2="420" stroke="#3b6ea5" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Substance Agent -->
  <g class="node" data-tip="Extracts CONTENT: settled conclusions, open questions, best ideas, dependency chains, concrete proposals. Produces priorConstraints for next iteration. Writes substance-*.md and substance-*.json.">
    <rect x="500" y="420" width="140" height="44" rx="4" fill="#e8f0fa" stroke="#3b6ea5" stroke-width="2"/>
    <rect x="503" y="423" width="134" height="38" rx="3" fill="#e8f0fa" stroke="#3b6ea5" stroke-width="1"/>
    <text x="570" y="447" text-anchor="middle" font-size="13" font-weight="600" fill="#2c2c2c">substance</text>
  </g>
  <line x1="438" y1="395" x2="505" y2="420" stroke="#3b6ea5" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output files -->
  <g class="node" data-tip="Process quality assessment file. Machine-readable JSON + human-readable markdown.">
    <text x="290" y="488" text-anchor="middle" font-size="11" fill="#666" font-family="IBM Plex Mono, monospace">meta-*.md</text>
  </g>
  <line x1="290" y1="464" x2="290" y2="478" stroke="#888" stroke-width="1" marker-end="url(#arrow-gray)"/>

  <g class="node" data-tip="Substantive deliverable. Settled conclusions, open questions, and priorConstraints block for iteration.">
    <text x="570" y="488" text-anchor="middle" font-size="11" fill="#666" font-family="IBM Plex Mono, monospace">substance-*.md</text>
  </g>
  <line x1="570" y1="464" x2="570" y2="478" stroke="#888" stroke-width="1" marker-end="url(#arrow-gray)"/>

  <!-- Barrier / join -->
  <g class="node" data-tip="Barrier: both mechanics and substance must complete before the iteration agent runs. Only the iteration agent sees both reports.">
    <polygon points="430,510 445,525 430,540 415,525" fill="#fdf0f2" stroke="#c0586e" stroke-width="1.5"/>
    <text x="430" y="529" text-anchor="middle" font-size="9" fill="#c0586e" font-weight="700">&#8904;</text>
  </g>
  <line x1="290" y1="464" x2="290" y2="515" stroke="#3b6ea5" stroke-width="1.2"/>
  <line x1="290" y1="515" x2="415" y2="525" stroke="#3b6ea5" stroke-width="1.2"/>
  <line x1="570" y1="464" x2="570" y2="515" stroke="#3b6ea5" stroke-width="1.2"/>
  <line x1="570" y1="515" x2="445" y2="525" stroke="#3b6ea5" stroke-width="1.2"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ITERATION SECTION -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Iteration Agent -->
  <g class="node" data-tip="Decision agent. Reads both mechanics and substance reports. Decides whether to re-run the debate with substance as prior constraints, or stop. Respects iteration budget.">
    <rect x="360" y="580" width="140" height="44" rx="4" fill="#faf0e8" stroke="#c08a3b" stroke-width="2"/>
    <rect x="363" y="583" width="134" height="38" rx="3" fill="#faf0e8" stroke="#c08a3b" stroke-width="1"/>
    <text x="430" y="607" text-anchor="middle" font-size="13" font-weight="600" fill="#2c2c2c">iteration</text>
  </g>
  <line x1="430" y1="540" x2="430" y2="580" stroke="#3b6ea5" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision split -->
  <line x1="430" y1="624" x2="430" y2="660" stroke="#3b6ea5" stroke-width="1.5"/>

  <!-- Stop branch -->
  <g class="node" data-tip="Debate complete. All output files are in the debate directory.">
    <line x1="430" y1="660" x2="570" y2="660" stroke="#3b6ea5" stroke-width="1.5"/>
    <ellipse cx="620" cy="660" rx="40" ry="16" fill="none" stroke="#3b6ea5" stroke-width="1.5"/>
    <text x="620" y="664" text-anchor="middle" font-size="12" fill="#3b6ea5" font-weight="600" font-family="IBM Plex Mono, monospace">done</text>
  </g>
  <text x="510" y="653" text-anchor="middle" font-size="11" fill="#5a8a3c" font-weight="600">"stop"</text>

  <!-- Iterate branch -->
  <g class="node" data-tip="Re-run the debate with constraints derived from substance report. Settled conclusions become givens, open questions become focus areas.">
    <line x1="430" y1="660" x2="290" y2="660" stroke="#c0586e" stroke-width="1.5"/>
    <line x1="290" y1="660" x2="290" y2="720" stroke="#c0586e" stroke-width="1.5"/>
    <text x="290" y="738" text-anchor="middle" font-size="11" fill="#c0586e" font-family="IBM Plex Mono, monospace">.constraints</text>
  </g>
  <text x="350" y="653" text-anchor="middle" font-size="11" fill="#c0586e" font-weight="600">"iterate"</text>

  <!-- Feedback loop back to debate box -->
  <line x1="290" y1="720" x2="100" y2="720" stroke="#c0586e" stroke-width="1.5" stroke-dasharray="8,4"/>
  <line x1="100" y1="720" x2="100" y2="190" stroke="#c0586e" stroke-width="1.5" stroke-dasharray="8,4"/>
  <line x1="100" y1="190" x2="108" y2="190" stroke="#c0586e" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="80" y="460" text-anchor="middle" font-size="11" fill="#c0586e" font-family="IBM Plex Mono, monospace" transform="rotate(-90, 80, 460)">feedback loop</text>

  <!-- Legend -->
  <g transform="translate(620, 700)">
    <text x="0" y="0" font-size="11" font-weight="600" fill="#2c2c2c">Legend</text>
    <rect x="0" y="10" width="20" height="12" rx="2" fill="#e8f0fa" stroke="#3b6ea5" stroke-width="1.5"/>
    <text x="28" y="20" font-size="10" fill="#2c2c2c">agent</text>
    <polygon points="10,35 20,42 10,49 0,42" fill="#fdf0f2" stroke="#c0586e" stroke-width="1"/>
    <text x="28" y="45" font-size="10" fill="#2c2c2c">sync point</text>
    <line x1="0" y1="58" x2="20" y2="58" stroke="#c0586e" stroke-width="1.5" stroke-dasharray="6,3"/>
    <text x="28" y="62" font-size="10" fill="#2c2c2c">feedback</text>
    <line x1="0" y1="73" x2="20" y2="73" stroke="#3b6ea5" stroke-width="1.5"/>
    <text x="28" y="77" font-size="10" fill="#2c2c2c">data flow</text>
  </g>
</svg>

<script>
const tip = document.getElementById('tip');
document.querySelectorAll('[data-tip]').forEach(el => {
  el.style.cursor = 'pointer';
  el.addEventListener('mouseenter', e => {
    tip.textContent = el.getAttribute('data-tip');
    tip.style.opacity = '1';
  });
  el.addEventListener('mousemove', e => {
    tip.style.left = (e.clientX + 12) + 'px';
    tip.style.top = (e.clientY + 12) + 'px';
  });
  el.addEventListener('mouseleave', () => {
    tip.style.opacity = '0';
  });
});
</script>

</body>
</html>
